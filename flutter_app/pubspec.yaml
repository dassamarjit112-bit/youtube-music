name: ytm_clone
description: YouTube Music Clone APK Wrapper.
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.0+4
  url_launcher: ^6.3.1
  media_kit: ^1.1.10+1
  audio_service: ^0.18.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/www/
    - assets/www/assets/
