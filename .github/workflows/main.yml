name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # This version is high enough to satisfy the 3.41.6 SDK requirement
          flutter-version: '3.41.6' 
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build APK
        run: |
          cd flutter_app
          # Added flags to bypass common mobile-build rendering errors
          flutter build apk --release --no-tree-shake-icons --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Music-Fixed
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
