name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # FIX: This sets up the correct Java environment for the Linux runner
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6' 
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build APK
        run: |
          cd flutter_app
          # FIX: The -P flag overrides the broken local Java path
          flutter build apk --release --no-tree-shake-icons -v
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-new-app
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          
      - name: Generate Signing Report
        run: |
          cd flutter_app/android
          ./gradlew signingReport
          
